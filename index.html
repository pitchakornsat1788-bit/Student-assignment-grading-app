<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เว็บจดการบ้าน</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 30px auto;
        padding: 20px;
        background: #f4f4f4;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input {
        flex: 1;
        padding: 10px;
    }

    button {
        padding: 10px 15px;
        cursor: pointer;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: white;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .done {
        text-decoration: line-through;
        color: gray;
    }

    .delete {
        background: red;
    }
</style>
</head>
<body>

<h1>📚 เว็บจดการบ้าน</h1>

<div class="input-group">
    <input type="text" id="homeworkInput" placeholder="พิมพ์การบ้าน...">
    <button onclick="addHomework()">เพิ่ม</button>
</div>

<ul id="homeworkList"></ul>

<script>
function addHomework() {
    const input = document.getElementById("homeworkInput");
    const text = input.value.trim();

    if (text === "") return;

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    span.onclick = () => {
        span.classList.toggle("done");
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "ลบ";
    deleteBtn.className = "delete";
    deleteBtn.onclick = () => li.remove();

    li.appendChild(span);
    li.appendChild(deleteBtn);

    document.getElementById("homeworkList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
